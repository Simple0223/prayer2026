<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3X3 禱告計畫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f2f2f2;
            font-family: 'Noto Sans TC', sans-serif;
        }

        #content {
            font-size: 1.2rem;
            transition: font-size 0.2s;
        }

        .font-btn {
            color: #747474;
            background-color: #D9D9D9;
            padding: 4px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: .2s;
        }

            .font-btn:hover {
                background-color: #D9D9D9;
            }

            .font-btn.active {
                background-color: #747474;
                color: white;
            }

        .nav-btn {
            background-color: #CC2D00;
            color: #fff;
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }

            .nav-btn:hover {
                background-color: #CC2D00;
            }

            /* 點擊時的效果（按下瞬間） */
            .nav-btn:active {
                transform: scale(0.97);
                background-color: #CC2D00;
            }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-2xl mx-auto">

        <img src="https://github.com/Simple0223/prayer2026/blob/main/3x3-banner.png?raw=true" alt="Logo" class="p-6 object-contain flex justify-center items-center">

            <button onclick="setFontSize('1.5rem', this)" class="font-btn">大</button>

            "挪開撒但作為(一)\n可4:15-17「那撒在路旁的，就是人聽了道，撒旦立刻來，把撒在他心裡的道奪了去；那撒在石頭地上的，就是人聽了道，立刻歡喜領受，但他心裡沒有根，不過是暫時的，及至為道遭了患難，或是受了逼迫，立刻就跌倒了。」\n主啊！求祢挪去撒旦一切的作為，讓________的耳朵和心被打開，________的心要對福音敏銳，聖靈要開啟________蒙蔽的心，使________心中一切的雜亂、苦毒……等敵對福音的思想意念都降服在主的大能下。 主啊！祢的福音要使________的心裡喜樂平安，福音的種子要長大而且生根在________的生命裡，沒有任何患難或逼迫可以使________離開祢的福音，________的生命要穩穩紮根在祢的真理裡面。",
            "挪開撒但作為(二)\n可4:18-19「還有那撒在荊棘裡的，就是人聽了道，後來有世上的思慮、錢財的迷惑，和別樣的私慾進來，把道擠住了，就不能結實。」\n主啊！求祢在________生命中掌權，使________對福音有良好的反應，堅定________對主的決志。求主將一切世界的思慮、錢財的迷惑、個人的私慾……等挪去，沒有任何環境、誘惑或錯誤的思想觀念言語可以使________離開主的福音，________的心要完全被主掌管。 求主掌管________的心思意念，一切自我的思想、驕傲的言論、世界的價值觀和想法，要完全從________生命中除去，使一個新的、屬神的價值觀、思想、生活方式在________裡面成形、塑造。",
            "除去帕子\n林後4:3-4「如果我們的福音蒙蔽，就是蒙蔽在滅亡的人身上。此等不信之人被這世界的神弄瞎了心眼，不叫基督榮耀福音的光照著他們。基督本是神的像。」\n求主挪去________生命裡一切敵基督、蒙蔽福音、偶像、黑暗、犯罪、老我、血氣、世界一切權勢、堅固營壘，________心裡一切抵擋真理的邪靈都要被基督的能力瓦解除滅。________要歡迎至高者、萬王之王耶穌基督掌權，聖靈要進入________心中，________要口稱耶穌基督是主，成為上帝的兒女。",
            "使人悔改\n提後2:25-26「用溫柔勸戒那抵擋的人；或者神給他們悔改的心，可以明白真道，叫他們這已經被魔鬼任意擄去的，可以醒悟，脫離他的網羅。」\n主啊！________生命中一切抵擋福音的權勢都要被挪開，聖靈要保守________的心，使________的心回轉，悔改，________心裡自我、自以為義的思想要被扭轉，福音要改變________的信念系統，思想、價值體系，過去魔鬼、世界放在________裡一切的黑暗、污穢被拔除，________要明白真道，醒悟過來，脫離魔鬼的網羅。________要有一個屬神的、聖潔的思想、信仰和價值觀，________要脫離過去生活方式，有一個新生命。",
            "收割莊稼\n約4:35-36「你們豈不說：『到收割的時候還有四個月』嗎？我告訴你們，舉目向田觀看，莊稼已經熟了，可以收割了。收割的人得工價，積蓄五榖到永生，叫撒種的和收割的一同快樂。」\n主啊！開啟我屬靈的眼睛，看見全地都遍滿了待收割的莊稼，在靈裡我已經看見一整片金黃色的麥田，就是靈魂的莊稼，我宣告現在就是收割的時刻，我要跨出信心的行動，勇敢地和________分享我的見證，向________傳揚耶穌在我生命中所作的事，我要邀請________來參加小組、主日聚會、福音佈道活動！聖靈啊，激動我的心，就是現在，現在就是莊稼成熟時，________必要認識耶穌！",
            "禁食呼求\n代下7:14-15「這稱為我名下的子民，若是自卑、禱告，尋求我的面，轉離他們的惡行，我必從天上垂聽，赦免他們的罪，醫治他們的地。我必睜眼看、側耳聽在此處所獻的禱告。」\n主啊！幫助我藉著禁食禱告，謙卑地來到祢面前，顯明我隱而未現的罪（具體說出你的罪），使我悔改、回轉，跟祢恢復美好的關係。饒恕我常常倚靠自己，求祢使我單單仰望祢，讓我經歷禁食禱告的大能，把不可能的思想挪去，我要宣告，在祢凡事都能。 主啊！我代表________來到祢面前，向祢承認我們犯罪得罪祢，與祢隔絕，求祢光照我們，顯明我們所有的罪，饒恕我們，潔淨我們，醫治我們。求祢施恩典及憐憫，拯救我們從一切污穢敗壞中出來。",
            "爭戰得勝\n林後10:4-5「我們爭戰的兵器本不屬血氣的，乃是在神面前有能力的，可以攻破堅固的營壘，將各樣的計謀，各樣攔阻人認識神的那些自高之事，一概攻破了，又將人所有的心意奪回，使他都順服基督。」\n我奉耶穌基督的聖名綑綁、摧毀的________〈攔阻他不信耶穌基督的原因，如思想、罪…等〉堅固營壘！ 奉耶穌基督的名摧毀那攔阻________認識神的每一種高傲的思想言論，將________的思想奪回來歸順基督。 奉耶穌基督的名綑綁撒旦在________身上的計謀，求主保守________的思想不被撒旦誘惑。 奉耶穌的名綑綁撒旦一切的計謀，宣告撒旦的武器完全被摧毀，________必能得到完全的自由。",
            "穿戴全副軍裝\n弗6:11「要穿戴神所賜的全副軍裝，就能抵擋魔鬼的詭計。」\n我以感恩的心將救恩的頭盔戴在頭上。\n我宣告，從此我的思想不再記憶過去痛苦的回憶，不再聽從魔鬼的謊言，不再容許任何不義或污穢的思想。我將我的心思與意念放在神的話語裡頭。我要常常思念救主耶穌及他的救恩。凡是美善的、真實的、公義的、清潔的、可敬的、有德行的，我都要思想。\n我以感恩的心將公義的護心鏡戴在胸前。\n我宣告，因著耶穌的赦罪與救贖，我得以披戴主耶穌的公義。從此，我的心尊主為大。我也將結出聖靈的果子，就是仁愛、喜樂、和平、忍耐、恩慈、良善、信實、溫柔、節制。\n我以真理當作帶子束在我的腰間。\n我宣告，聖經就是我一生的生活準則，我選擇站穩在神的應許上，我不懷疑神的信實，神的應許就是我的力量與喜樂。\n我將平安的福音當作鞋子穿在腳上。\n我宣告，凡我腳掌所踏之處，我都要成為神和平的使者，我要將勸人與神和好的資訊傳達出去，我也決心與人尋求和睦。\n我的左手拿著信德的盾牌。\n我宣告，我要相信神在聖經裡的話語，我要用信心抵擋和魔鬼有關的一切謊言，我選擇不要聽從魔鬼的建議，也不接受他似是而非的話語。\n我的右手握著聖靈的寶劍，就是神的道。\n我宣告，從此，我的口要傳講神的話語，把神的救恩和大能與人分享，我的口要說出造就人的話，使人得勉勵，我的口要發出有信心與有能力的禱告，使神的美意降臨在人的生命中。",
            "拯救靈魂(一)\n天父啊！我把親愛的________帶到祢面前，我知道撒旦已使他眼瞎，並深深捆綁他，才落得如此光景，不能（或不肯）來到祢面前求幫助。因此，我願在祢的寶座前為他代禱，求聖靈指引我，賜給我禱告的智慧、能力和見識。\n倚靠主耶穌基督的名，我要解開撒旦在________身上的捆綁，禁止一切黑暗的權勢在他身上作工，砍斷在他真道上的桎梏。靠主耶穌基督的名，醫治________的灰心和失望，唯願主耶穌基督的工作，直接臨到________身上，使他得到主的力量和幫助。求主用祢道成肉身、被釘、復活、升天和榮耀的大能，直接抵擋要毀滅________的黑暗力量。求聖靈運用主耶穌基督大能的工作，直接攔阻要毀壞________的一切黑暗權勢。\n天父，求祢開啟________智慧的眼睛，開通他屬靈的耳朵，在________的生活中我願作上帝的祭司。求主施慈愛，赦免________失敗悖逆的罪惡，使他順從、服事主耶穌基督。願上帝的靈在________身上，成全祢大能的工作，賜給________一顆悔改的心，使他從一切的捆綁中，得到完全的釋放。\n倚靠主耶穌基督的名，感謝上帝，因祢垂聽了我的禱告，並賜給我足夠的恩典，讓我為________忠實的禱告，藉著________的得救來榮耀祢，阿們！",
            "拯救靈魂(二)\n1.感謝神願人人得救，使凡有血氣的都要來就近神，都要看見神的救恩。\n2.宣告________是神所買贖回來的，求主使________蒙聖靈的光照，能悔改使心眼得開，從黑暗歸向光明，從撒旦權下歸向真神，又要信耶穌，罪得赦免，同得基督基業。\n3.奉主名捆綁在________身上敵基督、蒙蔽福音、偶像、黑暗、犯罪、老我、血氣、世界一切權勢、堅固營壘、一切敵擋真理的邪靈，都要崩潰瓦解離開。\n4.求聖靈的能力進入________心中，改變________的生命。奉主名求聖靈釋放________，意志歸回順服主、重生、悔改、棄罪、更新、被聖靈充滿、喜歡學習耶穌生命、愛讀聖經、生活有見証、成為福音見証主的器皿。\n5.求神興起環境，使________發現靈裡的需要。\n6.求神使我成為平安與救恩的導管。\n7.求神保守我與________的關係能不斷有美好的進展。\n8.傾聽聖靈為他（她）禱告的方向指引。\n9.陰間的權勢不能勝過教會，兩個人同心合意的求，天父必為他們成全。\n10.敏銳聖靈在人心作工的時機（如對方有需要、困難、難處或……等），順服聖靈的感動去服事對方。",
            "拯救靈魂(一)\n天父啊！我把親愛的________帶到祢面前，我知道撒旦已使他眼瞎，並深深捆綁他，才落得如此光景，不能（或不肯）來到祢面前求幫助。因此，我願在祢的寶座前為他代禱，求聖靈指引我，賜給我禱告的智慧、能力和見識。\n倚靠主耶穌基督的名，我要解開撒旦在________身上的捆綁，禁止一切黑暗的權勢在他身上作工，砍斷在他真道上的桎梏。靠主耶穌基督的名，醫治________的灰心和失望，唯願主耶穌基督的工作，直接臨到________身上，使他得到主的力量和幫助。求主用祢道成肉身、被釘、復活、升天和榮耀的大能，直接抵擋要毀滅________的黑暗力量。求聖靈運用主耶穌基督大能的工作，直接攔阻要毀壞________的一切黑暗權勢。\n天父，求祢開啟________智慧的眼睛，開通他屬靈的耳朵，在________的生活中我願作上帝的祭司。求主施慈愛，赦免________失敗悖逆的罪惡，使他順從、服事主耶穌基督。願上帝的靈在________身上，成全祢大能的工作，賜給________一顆悔改的心，使他從一切的捆綁中，得到完全的釋放。\n倚靠主耶穌基督的名，感謝上帝，因祢垂聽了我的禱告，並賜給我足夠的恩典，讓我為________忠實的禱告，藉著________的得救來榮耀祢，阿們！",
            "拯救靈魂(二)\n1.感謝神願人人得救，使凡有血氣的都要來就近神，都要看見神的救恩。\n2.宣告________是神所買贖回來的，求主使________蒙聖靈的光照，能悔改使心眼得開，從黑暗歸向光明，從撒旦權下歸向真神，又要信耶穌，罪得赦免，同得基督基業。\n3.奉主名捆綁在________身上敵基督、蒙蔽福音、偶像、黑暗、犯罪、老我、血氣、世界一切權勢、堅固營壘、一切敵擋真理的邪靈，都要崩潰瓦解離開。\n4.求聖靈的能力進入________心中，改變________的生命。奉主名求聖靈釋放________，意志歸回順服主、重生、悔改、棄罪、更新、被聖靈充滿、喜歡學習耶穌生命、愛讀聖經、生活有見証、成為福音見証主的器皿。\n5.求神興起環境，使________發現靈裡的需要。\n6.求神使我成為平安與救恩的導管。\n7.求神保守我與________的關係能不斷有美好的進展。\n8.傾聽聖靈為他（她）禱告的方向指引。\n9.陰間的權勢不能勝過教會，兩個人同心合意的求，天父必為他們成全。\n10.敏銳聖靈在人心作工的時機（如對方有需要、困難、難處或……等），順服聖靈的感動去服事對方。"

        const dateLabels = [
            "7月15日 起來禱告", "7月16日 十架的愛", "7月17日 神的憐憫", "7月18日 枯骨復活", "7月19日 凡事都能的信心", "7月20日 使無變有的信心", "7月21日 不灰心的禱告", "7月22日 成長的信心", "7月23日 神願人人得救", "7月24日 神拯救罪人",
            "7月25日 主禱文:太6:9-13", "7月26日 詩篇23篇", "7月27日 來到施恩座前求", "7月28日 讚美的大能", "7月29日 高舉主名", "7月30日 福音傳開", "7月31日 放膽傳道", "8月1日 開啟屬靈眼睛", "8月2日 迫切禱告", "8月3日 預備人心成為好土",
            "8月4日 挪開撒但作為(一)", "8月5日 挪開撒但作為(二)", "8月6日 除去帕子", "8月7日 使人悔改", "8月8日 收割莊稼", "8月9日 禁食呼求", "8月10日 爭戰得勝", "8月11日 穿戴全副軍裝", "8月12日 拯救靈魂(一)", "8月13日 拯救靈魂(二)", "8月14日 拯救靈魂(一)", "8月15日 拯救靈魂(二)"
        ];

        function init() {
            const select = document.getElementById('date-select');

            dateLabels.forEach((label, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = label;
                select.appendChild(opt);
            });

            // ⭐ 自動選擇今天日期
            const today = new Date();
            const month = today.getMonth() + 1;
            const day = today.getDate();

            let targetIndex = dateLabels.findIndex(label => {
                // 取 "7月15日" 這種格式
                const match = label.match(/(\d+)月(\d+)日/);
                if (!match) return false;

                const m = parseInt(match[1]);
                const d = parseInt(match[2]);

                return m === month && d === day;
            });

            // 如果找不到 → 預設 8/1（index 17）
            if (targetIndex === -1) {
                targetIndex = 0;
            }

            select.value = targetIndex;

            updateView();
        }

        function setFontSize(size) {
            document.getElementById('content').style.fontSize = size;
        }

        function setFontSize(size, btn) {
            document.getElementById("content").style.fontSize = size;

            document.querySelectorAll(".font-btn").forEach(b => {
                b.classList.remove("active");
            });

            btn.classList.add("active");
        }

        function updateView() {
            const select = document.getElementById('date-select');
            const dayIdx = parseInt(select.value);
            const rawContent = prayerData[dayIdx] || "內容準備中...";

            const lines = rawContent.split('\n');

            // 將第一行（主題）置中並加大
            let htmlContent = `<div class="text-center font-bold text-2xl mb-6 border-b border-red-800 pb-2" style="color: #CC2D00;">${lines[0]}</div>`;

            // 經卷名稱列表，用於識別
            const bibleBooks = ["出", "賽", "太", "結", "可", "羅", "路", "來", "彼後", "帖後", "徒", "雅", "林後", "代下", "弗", "約", "詩", "提後"];

            for (let i = 1; i < lines.length; i++) {
                let line = lines[i];
                let isVerse = bibleBooks.some(book => line.startsWith(book));

                if (isVerse) {
                    htmlContent += `<div class="font-bold mb-2" style="color: #6A3906;">${line}</div>`;
                } else {
                    htmlContent += `<div class="mb-2">${line}</div>`;
                }
            }
            document.getElementById('content').innerHTML = htmlContent;
        }

        function changeDay(delta) {
            const select = document.getElementById('date-select');
            const newVal = parseInt(select.value) + delta;
            if (newVal >= 0 && newVal < prayerData.length) {
                select.value = newVal;
                updateView();
            }
        }

        init();
    </script>
